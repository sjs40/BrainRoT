appId: com.brainrot.app
productName: BrainRoT

directories:
  output: release

files:
  - dist/**
  - dist-electron/**
  - branding/**
  - package.json

mac:
  icon: branding/png/light/icon-512.png
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64

win:
  icon: branding/app/app-icon.ico
  target:
    - target: nsis
      arch:
        - x64

linux:
  icon: branding/png/light/
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
